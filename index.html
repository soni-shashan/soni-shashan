/* ── CURSOR ───────────────────────────────────────────── */
function useCursor(){
  useEffect(()=>{
    const c=document.getElementById('cursor'),r=document.getElementById('cursor-ring');
    const move=e=>{
      c.style.left=e.clientX+'px'; c.style.top=e.clientY+'px';
      r.style.left=e.clientX+'px'; r.style.top=e.clientY+'px';
    };
    window.addEventListener('mousemove',move);
    return()=>window.removeEventListener('mousemove',move);
  },[]);
}

/* ── REVEAL ───────────────────────────────────────────── */
function Reveal({children,delay=0,style={}}){
  const ref=useRef(); const [v,setV]=useState(false);
  useEffect(()=>{
    const ob=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true)},{threshold:0.08});
    if(ref.current)ob.observe(ref.current);
    return()=>ob.disconnect();
  },[]);
  return <div ref={ref} style={{opacity:v?1:0,transform:v?'none':'translateY(28px)',transition:`opacity 0.7s ${delay}s ease,transform 0.7s ${delay}s ease`,...style}}>{children}</div>;
}

/* ── ANIM NUMBER ──────────────────────────────────────── */
function AnimNum({val,suffix=''}){
  const [n,setN]=useState(0); const ref=useRef();
  useEffect(()=>{
    const ob=new IntersectionObserver(([e])=>{
      if(e.isIntersecting){
        const num=parseFloat(val); let s=0; const step=num/40;
        const t=setInterval(()=>{s+=step;if(s>=num){setN(num);clearInterval(t);}else setN(parseFloat(s.toFixed(2)));},30);
        ob.disconnect();
      }
    });
    if(ref.current)ob.observe(ref.current);
    return()=>ob.disconnect();
  },[val]);
  return <span ref={ref}>{n}{suffix}</span>;
}
