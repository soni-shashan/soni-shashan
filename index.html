<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page-title">Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#060912;color:#e8eaf6;font-family:'Cabinet Grotesk',sans-serif;overflow-x:hidden;cursor:none}
#cursor{position:fixed;width:10px;height:10px;background:#00d4ff;border-radius:50%;pointer-events:none;z-index:9999;transition:transform 0.1s;mix-blend-mode:difference;transform:translate(-50%,-50%)}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(0,212,255,0.45);border-radius:50%;pointer-events:none;z-index:9998;transition:all 0.18s ease;transform:translate(-50%,-50%)}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9990;opacity:0.35}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#060912}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.25);border-radius:2px}
::selection{background:rgba(0,212,255,0.18);color:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px #00d4ff}50%{opacity:0.45;box-shadow:0 0 3px #00d4ff}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef} = React;

/* ── CONFIG LOADER ────────────────────────────────────── */
let CONFIG = null;

function useConfig() {
  const [config, setConfig] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    fetch('config.json')
      .then(res => res.json())
      .then(data => {
        CONFIG = data;
        setConfig(data);
        // Update page title
        document.getElementById('page-title').textContent = 
          `${data.personal.name} — ${data.personal.title}`;
        setLoading(false);
      })
      .catch(err => {
        console.error('Failed to load config:', err);
        setError(err);
        setLoading(false);
      });
  }, []);

  return { config, loading, error };
}

/* ── CURSOR ───────────────────────────────────────────── */
function useCursor(){
  useEffect(()=>{
    const c=document.getElementById('cursor');
    const r=document.getElementById('cursor-ring');
    const move=e=>{
      c.style.left=e.clientX+'px';
      c.style.top=e.clientY+'px';
      r.style.left=e.clientX+'px';
      r.style.top=e.clientY+'px';
    };
    const enter=()=>{c.style.transform='translate(-50%,-50%) scale(1.8)';r.style.width='50px';r.style.height='50px'};
    const leave=()=>{c.style.transform='translate(-50%,-50%) scale(1)';r.style.width='36px';r.style.height='36px'};
    document.addEventListener('mousemove',move);
    document.querySelectorAll('a,button').forEach(el=>{
      el.addEventListener('mouseenter',enter);
      el.addEventListener('mouseleave',leave);
    });
    return()=>{
      document.removeEventListener('mousemove',move);
      document.querySelectorAll('a,button').forEach(el=>{
        el.removeEventListener('mouseenter',enter);
        el.removeEventListener('mouseleave',leave);
      });
    };
  },[]);
}

/* ── REVEAL ANIMATION ─────────────────────────────────── */
function Reveal({children,delay=0}){
  const ref=useRef();
  const [visible,setVisible]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(e=>{if(e[0].isIntersecting)setVisible(true)},{threshold:0.1});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[]);
  return <div ref={ref} style={{opacity:visible?1:0,transform:visible?'none':'translateY(24px)',transition:`all 0.7s ${delay}s`}}>{children}</div>;
}

/* ── SECTION HEADER ───────────────────────────────────── */
function SectionHead({tag,title,tagColor}){
  return(
    <Reveal>
      <div style={{marginBottom:'3rem'}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.7rem',color:tagColor,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:'0.6rem'}}>{tag}</div>
        <h2 style={{fontFamily:"'Clash Display',sans-serif",fontSize:'clamp(2rem,4vw,2.8rem)',fontWeight:700,letterSpacing:'-0.03em',lineHeight:1.1}}>{title}</h2>
      </div>
    </Reveal>
  );
}

/* ── NAV ──────────────────────────────────────────────── */
function Nav(){
  const [scrolled,setScrolled]=useState(false);
  useEffect(()=>{
    const s=()=>setScrolled(window.scrollY>50);
    window.addEventListener('scroll',s);
    return()=>window.removeEventListener('scroll',s);
  },[]);
  
  if (!CONFIG) return null;
  
  return(
    <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:999,padding:'1.2rem 3rem',display:'flex',justifyContent:'space-between',alignItems:'center',background:scrolled?'rgba(6,9,18,0.85)':'transparent',backdropFilter:scrolled?'blur(12px)':'none',borderBottom:scrolled?'1px solid rgba(232,234,246,0.05)':'none',transition:'all 0.3s'}}>
      <a href="#" style={{fontFamily:"'Clash Display',sans-serif",fontSize:'1.15rem',fontWeight:700,color:'#e8eaf6',textDecoration:'none',letterSpacing:'-0.02em'}}>
        {CONFIG.personal.name.split(' ')[0]}<span style={{color:'#00d4ff'}}>.</span>
      </a>
      <div style={{display:'flex',gap:'2rem',alignItems:'center'}}>
        {['projects','education','contact'].map((s,i)=>(
          <a key={i} href={`#${s}`} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.75rem',color:'rgba(232,234,246,0.5)',textDecoration:'none',transition:'color 0.2s',letterSpacing:'0.02em'}}
          onMouseEnter={e=>e.target.style.color='#00d4ff'}
          onMouseLeave={e=>e.target.style.color='rgba(232,234,246,0.5)'}>{s}</a>
        ))}
      </div>
    </nav>
  );
}

/* ── HERO ─────────────────────────────────────────────── */
function Hero(){
  if (!CONFIG) return null;
  const {personal, hero} = CONFIG;
  
  return(
    <section style={{minHeight:'100vh',display:'flex',alignItems:'center',padding:'0 3rem',position:'relative'}}>
      <div style={{maxWidth:1200,margin:'0 auto',width:'100%'}}>
        <Reveal>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.8rem',color:'#00d4ff',letterSpacing:'0.08em',marginBottom:'1rem'}}>{hero.greeting}</div>
        </Reveal>
        <Reveal delay={0.1}>
          <h1 style={{fontFamily:"'Clash Display',sans-serif",fontSize:'clamp(3rem,8vw,6rem)',fontWeight:700,letterSpacing:'-0.04em',lineHeight:1,marginBottom:'1.2rem'}}>
            {personal.name.split(' ').map((word,i)=>(
              <span key={i}>
                {word}
                {i===0&&<span style={{WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundImage:'linear-gradient(135deg,#00d4ff,#a78bfa)',backgroundClip:'text'}}>.</span>}
                {i<personal.name.split(' ').length-1&&<br/>}
              </span>
            ))}
          </h1>
        </Reveal>
        <Reveal delay={0.2}>
          <div style={{fontSize:'clamp(1rem,2vw,1.25rem)',color:'rgba(232,234,246,0.35)',fontWeight:500,marginBottom:'2rem',letterSpacing:'-0.01em'}}>{personal.tagline}</div>
        </Reveal>
        <Reveal delay={0.3}>
          <p style={{maxWidth:700,fontSize:'1.05rem',lineHeight:1.85,color:'rgba(232,234,246,0.45)',marginBottom:'3rem'}}>{hero.description}</p>
        </Reveal>
        <Reveal delay={0.4}>
          <div style={{display:'flex',gap:'1.2rem',flexWrap:'wrap'}}>
            <a href={hero.cta.primary.link} style={{background:'linear-gradient(135deg,#00d4ff,#a78bfa)',color:'#060912',padding:'1rem 2.5rem',borderRadius:'3px',fontWeight:700,textDecoration:'none',fontSize:'0.9rem',letterSpacing:'0.02em',boxShadow:'0 4px 30px rgba(0,212,255,0.22)',transition:'all 0.2s'}}
            onMouseEnter={e=>{e.target.style.transform='translateY(-2px)';e.target.style.boxShadow='0 8px 40px rgba(0,212,255,0.32)'}}
            onMouseLeave={e=>{e.target.style.transform='none';e.target.style.boxShadow='0 4px 30px rgba(0,212,255,0.22)'}}>{hero.cta.primary.text}</a>
            <a href={hero.cta.secondary.link} style={{background:'rgba(232,234,246,0.03)',color:'#e8eaf6',padding:'1rem 2.5rem',borderRadius:'3px',border:'1px solid rgba(232,234,246,0.1)',fontWeight:600,textDecoration:'none',fontSize:'0.9rem',letterSpacing:'0.02em',transition:'all 0.2s'}}
            onMouseEnter={e=>{e.target.style.background='rgba(232,234,246,0.06)';e.target.style.borderColor='rgba(232,234,246,0.2)'}}
            onMouseLeave={e=>{e.target.style.background='rgba(232,234,246,0.03)';e.target.style.borderColor='rgba(232,234,246,0.1)'}}>{hero.cta.secondary.text}</a>
          </div>
        </Reveal>
      </div>
      <div style={{position:'absolute',bottom:'2rem',left:'50%',transform:'translateX(-50%)',width:'1px',height:'60px',background:'linear-gradient(180deg,transparent,#00d4ff,transparent)',animation:'pulse 2s infinite'}}/>
    </section>
  );
}

/* ── STATS ────────────────────────────────────────────── */
function Stats(){
  if (!CONFIG) return null;
  
  return(
    <section style={{padding:'0 3rem 6rem',maxWidth:1200,margin:'0 auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'1.2rem'}}>
        {CONFIG.stats.map((s,i)=>(
          <Reveal key={i} delay={i*0.08}>
            <div style={{background:'rgba(6,9,18,0.6)',border:`1px solid ${s.color}1e`,borderRadius:'6px',padding:'2rem 1.5rem',textAlign:'center',position:'relative',overflow:'hidden',transition:'all 0.25s'}}
            onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-5px)';e.currentTarget.style.borderColor=s.color+'40'}}
            onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.borderColor=s.color+'1e'}}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:'2px',background:`linear-gradient(90deg,${s.color},transparent)`,opacity:0.7}}/>
              <div style={{fontSize:'2.5rem',fontWeight:800,fontFamily:"'Clash Display',sans-serif",color:s.color,marginBottom:'0.3rem',letterSpacing:'-0.03em'}}>{s.value}</div>
              <div style={{fontSize:'0.8rem',color:'rgba(232,234,246,0.4)',fontWeight:500,letterSpacing:'0.02em'}}>{s.label}</div>
            </div>
          </Reveal>
        ))}
      </div>
    </section>
  );
}

/* ── SKILLS ───────────────────────────────────────────── */
function Skills(){
  if (!CONFIG) return null;
  
  return(
    <section style={{padding:'0 3rem 6rem',maxWidth:1200,margin:'0 auto'}}>
      <SectionHead tag="// skills.map()" title="Technical Arsenal" tagColor="#00d4ff"/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:'1.2rem'}}>
        {Object.entries(CONFIG.skills).map(([cat,{items,color,icon}],i)=>(
          <Reveal key={i} delay={i*0.1}>
            <div style={{background:'rgba(6,9,18,0.6)',border:`1px solid ${color}1e`,borderRadius:'6px',padding:'1.8rem',position:'relative',overflow:'hidden',transition:'all 0.25s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=color+'40';e.currentTarget.style.transform='translateY(-3px)'}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=color+'1e';e.currentTarget.style.transform='none'}}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:'2px',background:`linear-gradient(90deg,${color},transparent)`,opacity:0.7}}/>
              <div style={{display:'flex',alignItems:'center',gap:'0.8rem',marginBottom:'1.2rem'}}>
                <div style={{fontSize:'1.5rem'}}>{icon}</div>
                <h3 style={{fontFamily:"'Clash Display',sans-serif",fontSize:'1.1rem',fontWeight:600,letterSpacing:'-0.02em'}}>{cat}</h3>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'0.5rem'}}>
                {items.map((sk,j)=>(
                  <span key={j} style={{background:`rgba(${color==='#f472b6'?'244,114,182':color==='#00d4ff'?'0,212,255':color==='#34d399'?'52,211,153':'167,139,250'},0.08)`,border:`1px solid ${color}1e`,borderRadius:'3px',padding:'0.4rem 0.9rem',fontSize:'0.75rem',color:'rgba(232,234,246,0.7)',fontFamily:"'JetBrains Mono',monospace",letterSpacing:'0.01em'}}>{sk}</span>
                ))}
              </div>
            </div>
          </Reveal>
        ))}
      </div>
    </section>
  );
}

/* ── PROJECTS ─────────────────────────────────────────── */
function Projects(){
  if (!CONFIG) return null;
  
  return(
    <section id="projects" style={{padding:'0 3rem 6rem',maxWidth:1200,margin:'0 auto'}}>
      <SectionHead tag="// projects[]" title="Featured Work" tagColor="#f472b6"/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(360px,1fr))',gap:'1.4rem'}}>
        {CONFIG.projects.map((p,i)=>(
          <Reveal key={i} delay={i*0.08}>
            <a href={p.link} target="_blank" style={{display:'block',background:'rgba(6,9,18,0.6)',border:`1px solid ${p.tagColor}1e`,borderRadius:'6px',padding:'2rem',position:'relative',overflow:'hidden',textDecoration:'none',color:'inherit',transition:'all 0.25s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=p.tagColor+'40';e.currentTarget.style.transform='translateY(-5px)'}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=p.tagColor+'1e';e.currentTarget.style.transform='none'}}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:'2px',background:`linear-gradient(90deg,${p.tagColor},transparent)`,opacity:0.7}}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1rem'}}>
                <div style={{fontSize:'2rem'}}>{p.icon}</div>
                <div style={{display:'flex',gap:'0.5rem',alignItems:'center'}}>
                  <span style={{background:`rgba(${p.tagColor==='#f472b6'?'244,114,182':p.tagColor==='#00d4ff'?'0,212,255':p.tagColor==='#34d399'?'52,211,153':'167,139,250'},0.12)`,border:`1px solid ${p.tagColor}30`,borderRadius:'3px',padding:'0.3rem 0.8rem',fontSize:'0.65rem',color:p.tagColor,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase'}}>{p.tag}</span>
                  {p.stars&&<span style={{fontSize:'0.75rem',color:'rgba(232,234,246,0.3)'}}>⭐ {p.stars}</span>}
                </div>
              </div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.65rem',color:'rgba(232,234,246,0.25)',marginBottom:'0.6rem',letterSpacing:'0.03em'}}>{p.period}</div>
              <h3 style={{fontFamily:"'Clash Display',sans-serif",fontSize:'1.2rem',fontWeight:600,letterSpacing:'-0.02em',marginBottom:'0.8rem',lineHeight:1.3}}>{p.title}</h3>
              <p style={{color:'rgba(232,234,246,0.45)',fontSize:'0.875rem',lineHeight:1.75,marginBottom:'1.2rem'}}>{p.description}</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:'0.4rem'}}>
                {p.tech.map((t,j)=>(
                  <span key={j} style={{background:'rgba(232,234,246,0.03)',border:'1px solid rgba(232,234,246,0.08)',borderRadius:'3px',padding:'0.25rem 0.65rem',fontSize:'0.68rem',color:'rgba(232,234,246,0.35)',fontFamily:"'JetBrains Mono',monospace"}}>{t}</span>
                ))}
              </div>
            </a>
          </Reveal>
        ))}
      </div>
    </section>
  );
}

/* ── CERTIFICATIONS ───────────────────────────────────── */
function Certifications(){
  if (!CONFIG) return null;
  
  return(
    <section style={{padding:'0 3rem 6rem',maxWidth:1200,margin:'0 auto'}}>
      <SectionHead tag="// certifications{}" title="Credentials & Learning" tagColor="#fbbf24"/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'1rem'}}>
        {CONFIG.certifications.map((c,i)=>(
          <Reveal key={i} delay={i*0.05}>
            <div style={{background:'rgba(6,9,18,0.6)',border:`1px solid ${c.color}1e`,borderRadius:'6px',padding:'1.3rem',position:'relative',overflow:'hidden',transition:'all 0.25s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=c.color+'40';e.currentTarget.style.transform='translateY(-3px)'}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=c.color+'1e';e.currentTarget.style.transform='none'}}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:'2px',background:`linear-gradient(90deg,${c.color},transparent)`,opacity:0.7}}/>
              <div style={{display:'flex',alignItems:'center',gap:'0.7rem',marginBottom:'0.8rem'}}>
                <div style={{fontSize:'1.3rem'}}>{c.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.62rem',color:c.color,opacity:0.7,letterSpacing:'0.04em',marginBottom:'0.15rem'}}>{c.issuer}</div>
                  <h4 style={{fontSize:'0.88rem',fontWeight:600,lineHeight:1.3,letterSpacing:'-0.01em'}}>{c.title}</h4>
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.62rem',color:'rgba(232,234,246,0.25)',letterSpacing:'0.02em'}}>{c.issued}</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.58rem',color:'rgba(232,234,246,0.18)',letterSpacing:'0.01em'}}>ID: {c.id}</div>
              </div>
            </div>
          </Reveal>
        ))}
      </div>
    </section>
  );
}

/* ── ACHIEVEMENTS ─────────────────────────────────────── */
function Achievements(){
  if (!CONFIG) return null;
  
  return(
    <section style={{padding:'0 3rem 6rem',maxWidth:1200,margin:'0 auto'}}>
      <SectionHead tag="// achievements.filter()" title="Recognitions & Impact" tagColor="#34d399"/>
      <div style={{display:'grid',gap:'1rem'}}>
        {CONFIG.achievements.map((a,i)=>(
          <Reveal key={i} delay={i*0.08}>
            <div style={{background:'rgba(6,9,18,0.6)',border:`1px solid ${a.color}1e`,borderRadius:'6px',padding:'1.8rem',position:'relative',overflow:'hidden',transition:'all 0.25s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=a.color+'40';e.currentTarget.style.transform='translateX(5px)'}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=a.color+'1e';e.currentTarget.style.transform='none'}}>
              <div style={{position:'absolute',left:0,top:0,bottom:0,width:'2px',background:`linear-gradient(180deg,${a.color},transparent)`}}/>
              <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'1.2rem'}}>
                <div style={{paddingTop:'0.1rem'}}>
                  <div style={{width:42,height:42,background:`rgba(${a.color==='#f472b6'?'244,114,182':a.color==='#fbbf24'?'251,191,36':a.color==='#34d399'?'52,211,153':a.color==='#00d4ff'?'0,212,255':'167,139,250'},0.1)`,border:`1px solid ${a.color}20`,borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem'}}>{a.icon}</div>
                </div>
                <div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.65rem',color:a.color,marginBottom:'0.3rem',letterSpacing:'0.04em'}}>{a.period}</div>
                  <h3 style={{fontFamily:"'Clash Display',sans-serif",fontSize:'1.15rem',fontWeight:600,letterSpacing:'-0.02em',marginBottom:'0.2rem'}}>{a.title}</h3>
                  <div style={{color:'rgba(232,234,246,0.4)',fontSize:'0.82rem',marginBottom:'0.6rem'}}>{a.org}</div>
                  <p style={{color:'rgba(232,234,246,0.45)',fontSize:'0.875rem',lineHeight:1.75}}>{a.desc}</p>
                </div>
              </div>
            </div>
          </Reveal>
        ))}
      </div>
    </section>
  );
}

/* ── EXPERIENCE ───────────────────────────────────────── */
function Experience(){
  if (!CONFIG || !CONFIG.experience.length) return null;
  
  return(
    <section style={{padding:'0 3rem 6rem',maxWidth:1200,margin:'0 auto'}}>
      <SectionHead tag="// experience[]" title="Work Experience" tagColor="#34d399"/>
      {CONFIG.experience.map((exp,i)=>(
        <Reveal key={i}>
          <div style={{background:`rgba(${exp.color==='#34d399'?'52,211,153':'0,212,255'},0.025)`,border:`1px solid ${exp.color}12`,borderRadius:'6px',padding:'2rem',position:'relative',overflow:'hidden',marginBottom:'1.5rem'}}>
            <div style={{position:'absolute',left:0,top:0,bottom:0,width:'2px',background:`linear-gradient(180deg,${exp.color},transparent)`}}/>
            <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'1.5rem'}}>
              <div style={{paddingTop:'0.1rem'}}>
                <div style={{width:48,height:48,background:`rgba(${exp.color==='#34d399'?'52,211,153':'0,212,255'},0.1)`,border:`1px solid ${exp.color}20`,borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.4rem'}}>{exp.icon}</div>
              </div>
              <div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.68rem',color:exp.color,marginBottom:'0.35rem',letterSpacing:'0.04em'}}>{exp.period} · {exp.type}</div>
                <h3 style={{fontFamily:"'Clash Display',sans-serif",fontSize:'1.3rem',fontWeight:600,letterSpacing:'-0.02em',marginBottom:'0.2rem'}}>{exp.title}</h3>
                <div style={{color:'rgba(232,234,246,0.45)',fontSize:'0.875rem',marginBottom:'0.75rem'}}>{exp.company} · {exp.location}</div>
                <p style={{color:'rgba(232,234,246,0.45)',fontSize:'0.875rem',lineHeight:1.75}}>{exp.description}</p>
              </div>
            </div>
          </div>
        </Reveal>
      ))}
    </section>
  );
}

/* ── EDUCATION ────────────────────────────────────────── */
function Education(){
  if (!CONFIG) return null;
  
  return(
    <section id="education" style={{padding:'0 3rem 6rem',maxWidth:1200,margin:'0 auto'}}>
      <SectionHead tag="// education.log" title="Academic Background" tagColor="#a78bfa"/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(340px,1fr))',gap:'1.4rem'}}>
        {CONFIG.education.map((ed,i)=>(
          <Reveal key={i} delay={i*0.1}>
            <div style={{background:'rgba(6,9,18,0.6)',border:`1px solid ${ed.color}1e`,borderRadius:'6px',padding:'2rem',position:'relative',overflow:'hidden',transition:'all 0.25s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=ed.color+'40';e.currentTarget.style.transform='translateY(-3px)'}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=ed.color+'1e';e.currentTarget.style.transform='none'}}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:'2px',background:`linear-gradient(90deg,${ed.color},transparent)`,opacity:0.7}}/>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.67rem',color:ed.color,letterSpacing:'0.08em',marginBottom:'0.7rem',opacity:0.8}}>{ed.period}</div>
              <h3 style={{fontFamily:"'Clash Display',sans-serif",fontSize:'1.15rem',fontWeight:600,letterSpacing:'-0.02em',marginBottom:'0.4rem'}}>{ed.degree}</h3>
              <div style={{color:'rgba(232,234,246,0.5)',fontSize:'0.875rem',marginBottom:'1rem'}}>{ed.institution} · {ed.detail}</div>
              <div style={{background:`rgba(${ed.color==='#00d4ff'?'0,212,255':ed.color==='#a78bfa'?'167,139,250':'52,211,153'},0.07)`,border:`1px solid ${ed.color}1e`,borderRadius:'3px',padding:'0.7rem 1rem',fontFamily:"'JetBrains Mono',monospace",fontSize:'0.76rem',color:ed.color,lineHeight:1.7}}>{ed.grade}</div>
            </div>
          </Reveal>
        ))}
      </div>
    </section>
  );
}

/* ── CONTACT ──────────────────────────────────────────── */
function Contact(){
  if (!CONFIG) return null;
  const {contact, personal} = CONFIG;
  
  return(
    <section id="contact" style={{borderTop:'1px solid rgba(232,234,246,0.05)',background:'rgba(0,212,255,0.01)',padding:'6rem 3rem'}}>
      <div style={{maxWidth:1200,margin:'0 auto',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'5rem',alignItems:'center'}}>
        <Reveal>
          <div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.7rem',color:'#00d4ff',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:'0.75rem'}}>// contact.init()</div>
            <h2 style={{fontFamily:"'Clash Display',sans-serif",fontSize:'clamp(2rem,4vw,3rem)',fontWeight:700,letterSpacing:'-0.03em',lineHeight:1.1,marginBottom:'1.5rem'}}>
              {contact.title.split(' ').map((word,i)=>(
                <span key={i}>
                  {i===1?<span style={{WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundImage:'linear-gradient(135deg,#00d4ff,#a78bfa)',backgroundClip:'text'}}>{word}</span>:word}
                  {' '}
                </span>
              ))}
            </h2>
            <p style={{color:'rgba(232,234,246,0.45)',fontSize:'1rem',lineHeight:1.85,marginBottom:'2.5rem'}}>
              {contact.description} Based in <strong style={{color:'rgba(232,234,246,0.7)',fontWeight:500}}>{personal.location}</strong> — {personal.availability}.
            </p>
            <a href={`mailto:${personal.email}`} style={{display:'inline-block',background:'linear-gradient(135deg,#00d4ff,#a78bfa)',color:'#060912',padding:'0.9rem 2.2rem',borderRadius:'3px',fontWeight:700,textDecoration:'none',fontSize:'0.9rem',letterSpacing:'0.02em',boxShadow:'0 4px 30px rgba(0,212,255,0.22)',transition:'all 0.2s'}}
            onMouseEnter={e=>{e.target.style.transform='translateY(-2px)';e.target.style.boxShadow='0 8px 40px rgba(0,212,255,0.32)'}}
            onMouseLeave={e=>{e.target.style.transform='none';e.target.style.boxShadow='0 4px 30px rgba(0,212,255,0.22)'}}>{contact.ctaText}</a>
          </div>
        </Reveal>
        <Reveal delay={0.15}>
          <div style={{display:'flex',flexDirection:'column',gap:'0.7rem'}}>
            {contact.links.map((c,i)=>(
              <a key={i} href={c.url} target="_blank" style={{display:'flex',alignItems:'center',gap:'1rem',padding:'0.9rem 1.2rem',background:'rgba(232,234,246,0.02)',border:'1px solid rgba(232,234,246,0.07)',borderRadius:'4px',textDecoration:'none',color:'#e8eaf6',transition:'all 0.2s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=c.color+'3a';e.currentTarget.style.transform='translateX(5px)';e.currentTarget.style.background='rgba(232,234,246,0.04)'}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(232,234,246,0.07)';e.currentTarget.style.transform='none';e.currentTarget.style.background='rgba(232,234,246,0.02)'}}>
                <div style={{width:36,height:36,background:`${c.color}10`,border:`1px solid ${c.color}20`,borderRadius:'6px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.95rem',flexShrink:0}}>{c.icon}</div>
                <div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.62rem',color:'rgba(232,234,246,0.3)',textTransform:'uppercase',letterSpacing:'0.08em',lineHeight:1,marginBottom:'0.18rem'}}>{c.label}</div>
                  <div style={{fontSize:'0.84rem',fontWeight:500,color:'rgba(232,234,246,0.75)'}}>{c.value}</div>
                </div>
                <div style={{marginLeft:'auto',color:'rgba(232,234,246,0.18)',fontSize:'0.8rem'}}>→</div>
              </a>
            ))}
          </div>
        </Reveal>
      </div>
    </section>
  );
}

/* ── FOOTER ───────────────────────────────────────────── */
function Footer(){
  if (!CONFIG) return null;
  
  return(
    <footer style={{borderTop:'1px solid rgba(232,234,246,0.05)',padding:'2rem 3rem',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'1rem'}}>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.72rem',color:'rgba(232,234,246,0.22)'}}>{CONFIG.footer.copyright}</span>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.68rem',color:'rgba(232,234,246,0.18)',fontStyle:'italic'}}>"{CONFIG.personal.quote}"</span>
    </footer>
  );
}

/* ── APP ──────────────────────────────────────────────── */
function App(){
  const {config, loading, error} = useConfig();
  useCursor();
  
  if (loading) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:'2rem',marginBottom:'1rem',animation:'spin 2s linear infinite'}}>⚙️</div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'0.9rem',color:'#00d4ff'}}>Loading portfolio...</div>
        </div>
      </div>
    );
  }
  
  if (error) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem'}}>
        <div style={{textAlign:'center',maxWidth:500}}>
          <div style={{fontSize:'3rem',marginBottom:'1rem'}}>⚠️</div>
          <h2 style={{fontFamily:"'Clash Display',sans-serif",fontSize:'1.5rem',marginBottom:'1rem',color:'#ff6b6b'}}>Failed to Load Configuration</h2>
          <p style={{color:'rgba(232,234,246,0.6)',marginBottom:'1rem'}}>Make sure <code>config.json</code> is in the same directory as this HTML file.</p>
          <pre style={{background:'rgba(0,0,0,0.3)',padding:'1rem',borderRadius:'6px',fontSize:'0.75rem',textAlign:'left',overflow:'auto'}}>{error.message}</pre>
        </div>
      </div>
    );
  }
  
  return(
    <>
      <Nav/>
      <Hero/>
      <Stats/>
      <Skills/>
      <Projects/>
      <Certifications/>
      <Achievements/>
      <Experience/>
      <Education/>
      <Contact/>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
